# Builds the Astro site, then deploys the Worker + dist/ to Cloudflare Workers.
# Add repo secret CLOUDFLARE_API_TOKEN (Workers Scripts:Edit, plus Account read).
# Worker secrets (RESEND_API_KEY, CONTACT_TO_EMAIL) are set in Cloudflare, not GitHub.

name: Build and deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Bakes PUBLIC_GTM_CONTAINER_ID into the static build (GA4, Clarity, etc. are tags inside GTM).
      - name: Build site
        env:
          PUBLIC_GTM_CONTAINER_ID: ${{ secrets.PUBLIC_GTM_CONTAINER_ID }}
        run: npm run build

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          wranglerVersion: '4.80.0'
