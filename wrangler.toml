# Worker + static assets (not Pages — `_headers` is ignored here).
# https://developers.cloudflare.com/workers/static-assets/

name = "saramonse"
main = "worker/index.ts"
compatibility_date = "2025-04-02"

[vars]
# Must be an address on your Resend-verified domain (display name optional).
CONTACT_FROM = "Saramonse Beauty <hi@saramonsebeauty.co.uk>"
# Footer newsletter — Resend Segments: https://resend.com/dashboard/segments (copy Segment ID)
RESEND_SEGMENT_ID = "4fc3550d-74c5-4c36-8518-44a9e35a81d9"

[assets]
directory = "./dist"
binding = "ASSETS"
not_found_handling = "404-page"
# Default is asset-first; POST /api/contact was 405 before the Worker ran. Run Worker first.
run_worker_first = true
